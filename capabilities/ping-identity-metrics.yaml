    description: MCP adapter for PingOne Platform API — Metrics. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: gettotalidentities
      description: gettotalidentities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ping-identity-metrics.gettotalidentities
      with:
