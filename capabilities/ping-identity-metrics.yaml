    resources:
    - name: environments-environmentID-totalIdentities
      path: /environments/{environmentID}/totalIdentities
      operations:
      - name: gettotalidentities
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.PING_IDENTITY_API_KEY}}'
  exposes:
  - type: rest
    namespace: ping-identity-metrics-rest
    port: 8080
    description: REST adapter for PingOne Platform API — Metrics. One Spectral-compliant resource per consumed operation,
